  homepage:
    hero:
      badge: "Conectando Mentes Tech Mundialmente"
      title_line1: "Aprende. Conecta."
      title_line2: "Colabora."
      subtitle: "Únete a LinkClick, la plataforma líder donde estudiantes y educadores de tecnología se unen para compartir conocimiento, crear conexiones y acelerar el aprendizaje a través de experiencias colaborativas."
      cta_button1: "Inicia Tu Viaje"
      cta_button2: "Explora la Comunidad"
      stats:
        users: "Usuarios Activos"
        sessions: "Sesiones de Estudio"
        rate: "Tasa de Éxito"
    features:
      title: "¿Por qué elegir LinkClick?"
      subtitle: "Descubre las características que hacen que el aprendizaje y la colaboración sean fluidos"
      cards:
        matching:
          title: "Matching Inteligente"
          description: "Conecta con compañeros y mentores basados en tus intereses, habilidades y metas de aprendizaje usando nuestro sistema de matching inteligente."
        interactive:
          title: "Aprendizaje Interactivo"
          description: "Participa en sesiones de estudio colaborativas con pizarras en tiempo real, notas compartidas y herramientas interactivas."
        chat:
          title: "Chat en Tiempo Real"
          description: "Comunícate sin problemas con chat integrado, intercambio de archivos y videollamadas para una colaboración efectiva."
        achievements:
          title: "Sistema de Logros"
          description: "Gana insignias y reconocimiento por tus contribuciones, ayudando a otros y alcanzando hitos de aprendizaje."
        safety:
          title: "Entorno Seguro"
          description: "Aprende en un entorno seguro y moderado con usuarios verificados y controles de privacidad exhaustivos."
        community:
          title: "Comunidad Global"
          description: "Únete a una red mundial de entusiastas de la tecnología, desde principiantes hasta expertos, todos apasionados por aprender."
    how_it_works:
      title: "Cómo Funciona"
      subtitle: "Comienza en tres simples pasos"
      steps:
        step1:
          title: "Crea Tu Perfil"
          description: "Regístrate y cuéntanos sobre tus intereses, habilidades y metas de aprendizaje para obtener recomendaciones personalizadas."
        step2:
          title: "Encuentra Tu Conexión"
          description: "Explora nuestra comunidad o deja que nuestro algoritmo inteligente te conecte con los compañeros de estudio y mentores perfectos."
        step3:
          title: "Empieza a Aprender"
          description: "Únete a sesiones de estudio, colabora en proyectos y acelera tu viaje de aprendizaje con compañeros y expertos."
    testimonials:
      title: "Lo que Dicen Nuestros Usuarios"
      subtitle: "Únete a miles de estudiantes y educadores satisfechos"
      cards:
        card1:
          quote: "\"LinkClick transformó mi experiencia de aprendizaje. ¡Encontré compañeros de estudio y mentores increíbles que me ayudaron a conseguir el trabajo de mis sueños!\""
          name: "Sarah Martinez"
          role: "Estudiante de Ciencias de la Computación"
        card2:
          quote: "\"Como educador, LinkClick me ayuda a conectar con estudiantes apasionados de todo el mundo. ¡Las herramientas colaborativas son increíbles!\""
          name: "Dr. James Wilson"
          role: "Profesor de Ingeniería de Software"
        card3:
          quote: "\"Las funciones de colaboración en tiempo real cambian las reglas del juego. He aprendido más en 3 meses que en un año estudiando solo.\""
          name: "Alex Liu"
          role: "Desarrollador Full-Stack"
    cta:
      title: "¿Listo para Transformar Tu Aprendizaje?"
      subtitle: "Únete a LinkClick hoy y sé parte de una próspera comunidad de entusiastas de la tecnología, aprendices y educadores de todo el mundo."
      cta_button1: "Únete a LinkClick Gratis"
      cta_button2: "Explora la Comunidad"
      features:
        feature1: "Unirse es gratis"
        feature2: "No se requiere tarjeta de crédito"
        feature3: "Empieza a aprender inmediatamente"
  
